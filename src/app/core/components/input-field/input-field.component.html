<svg *ngIf="type == 'search'" class="input-field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
    stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
    <circle cx="11" cy="11" r="8" />
    <path d="m21 21-4.35-4.35" />
</svg>
<input [id]="inputId" class="input-field" [ngClass]="type" [type]="type" [placeholder]="label" [value]="value"
    (input)="valueChange.emit($any($event.target).value)" autocomplete="off" />
